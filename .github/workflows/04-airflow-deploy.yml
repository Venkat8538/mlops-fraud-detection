name: Deploy Airflow DAGs to EC2

on:
  push:
    branches: [main]
    paths:
      - 'airflow/dags/**'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy-dags:
    name: Sync DAGs to Airflow EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::482227257362:role/github-actions-mlops-role
          aws-region:     us-east-1

      - name: Deploy DAGs via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.AIRFLOW_EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.AIRFLOW_EC2_SSH_KEY }}
          script: |
            cd ~/airflow
            git pull origin main
            echo "✅ DAGs updated"
            docker compose restart airflow-scheduler
