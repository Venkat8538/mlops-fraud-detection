name: Launch SageMaker Training Job

on:
  workflow_dispatch:
    inputs:
      max_depth:
        description: XGBoost max depth
        default: "6"
      n_estimators:
        description: Number of trees
        default: "200"
      learning_rate:
        description: Learning rate
        default: "0.1"

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  train:
    name: Train fraud detection model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::482227257362:role/github-actions-mlops-role
          aws-region:     us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install sagemaker boto3

      - name: Upload training script to S3
        run: |
          aws s3 cp sagemaker/training/train.py \
            s3://mlops-dev-mlflow-store/sagemaker/code/train.py

      - name: Launch SageMaker training job
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python sagemaker/launch_training.py
